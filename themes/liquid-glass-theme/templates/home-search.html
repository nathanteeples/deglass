<form action="/search" method="get" id="search-form-home" class="search-form">
  <div class="search-bar degoog-search-bar liquid-search-field" id="search-bar-home">
    <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
    <input type="text" class="search-input" id="search-input" name="q" autocomplete="off" placeholder="Search privately" />
    <div class="ac-dropdown" id="ac-dropdown-home"></div>
    <div id="search-bar-actions-home" class="search-bar-actions"></div>
  </div>
  <div class="button-row">
    <button type="submit" class="search-btn liquid-primary-button" id="btn-search"><span>Search</span><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></button>
    <button type="button" class="search-btn lucky-btn liquid-secondary-button" id="btn-lucky"><span class="lucky-default">{{t:index-templates.search.feeling-lucky}}</span><span class="lucky-slot"><span class="lucky-slot-inner" id="lucky-slot-inner"><span>{{t:index-templates.search.feeling-lucky}}</span><span class="lucky-alt">{{t:index-templates.search.feeling-curious}}</span><span class="lucky-alt">{{t:index-templates.search.feeling-adventurous}}</span><span class="lucky-alt">{{t:index-templates.search.feeling-playful}}</span><span class="lucky-alt">{{t:index-templates.search.feeling-stellar}}</span><span class="lucky-alt">{{t:index-templates.search.feeling-trendy}}</span></span></span></button>
  </div>
</form>
