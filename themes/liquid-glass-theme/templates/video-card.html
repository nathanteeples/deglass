<div class="video-thumb-wrap"><img class="video-thumb" src="{{ thumbnail_url }}" alt="{{ title }}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.video-play-icon').style.opacity='1'" />{{#if duration}}<span class="video-duration">{{ duration }}</span>{{/if duration}}<div class="video-play-icon"><svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="m9 5 10 7-10 7z"/></svg></div></div><div class="video-info"><span class="video-title">{{ title }}</span><span class="video-source">{{ hostname }}</span></div>
