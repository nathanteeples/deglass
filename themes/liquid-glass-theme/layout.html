<html lang="__LANG_ATTR__" __THEME_ATTRS__ __RTL_SUPPORT__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{t:app.description}}" />
    <link rel="icon" href="/public/favicon/favicon.ico?v=__APP_VERSION__" type="image/x-icon" />
    <link rel="manifest" href="/public/favicon/site.webmanifest" crossorigin="use-credentials" />
    <link rel="search" type="application/opensearchdescription+xml" title="{{t:app.title}}" href="/opensearch.xml" />
    <title>{{t:app.title}}</title>
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var root = document.documentElement;
        root.setAttribute("data-theme", saved === "light" || saved === "dark" ? saved : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      })();
    </script>
    <link rel="modulepreload" href="/public/app.js?v=__APP_VERSION__" />
    <link rel="stylesheet" href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__" />

  </head>

    <script type="module" src="/public/app.js?v=__APP_VERSION__"></script>
  </body>
</html>
